<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naples Jewelry Buyers — Animated Logo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060D18;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
canvas { max-width: 100%; border-radius: 8px; }
</style>
</head>
<body>
<canvas id="ngb"></canvas>
<script>
(function () {
  const canvas = document.getElementById('ngb');
  const ctx = canvas.getContext('2d');
  const W = 900, H = 380;
  canvas.width = W;
  canvas.height = H;

  let time = 0;
  let shimmer = -280;

  // Palm Beach champagne palette
  const G = {
    ivory:  '#F0E4C8',
    pale:   '#DEC898',
    warm:   '#C8A868',
    mid:    '#B09040',
    rich:   '#8C7228',
    deep:   '#6B5418',
    navy:   '#0D2040',
  };

  // Ambient-only particles — no mouse interaction
  const particles = Array.from({ length: 52 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    baseSize: 0.4 + Math.random() * 1.5,
    vx: (Math.random() - 0.5) * 0.22,
    vy: (Math.random() - 0.5) * 0.22,
    phase: Math.random() * Math.PI * 2,
    driftSpeed: 0.010 + Math.random() * 0.008,
    isStar: Math.random() > 0.52,
  }));

  function updateParticles() {
    for (const p of particles) {
      p.x = (p.x + p.vx + W) % W;
      p.y = (p.y + p.vy + H) % H;
      p.phase += p.driftSpeed;
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.max(0.03, 0.14 + Math.sin(p.phase) * 0.2);
      const sz = p.baseSize + Math.sin(p.phase * 1.3) * 0.32;
      ctx.save();
      ctx.globalAlpha = alpha;
      if (p.isStar) {
        ctx.fillStyle = G.pale;
        ctx.shadowBlur = 5;
        ctx.shadowColor = G.ivory;
        const s = sz * 2.1;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - s);
        ctx.lineTo(p.x + s * 0.22, p.y - s * 0.22);
        ctx.lineTo(p.x + s, p.y);
        ctx.lineTo(p.x + s * 0.22, p.y + s * 0.22);
        ctx.lineTo(p.x, p.y + s);
        ctx.lineTo(p.x - s * 0.22, p.y + s * 0.22);
        ctx.lineTo(p.x - s, p.y);
        ctx.lineTo(p.x - s * 0.22, p.y - s * 0.22);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillStyle = G.warm;
        ctx.shadowBlur = 3;
        ctx.shadowColor = G.pale;
        ctx.beginPath();
        ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawBackground() {
    ctx.fillStyle = '#060D18';
    ctx.fillRect(0, 0, W, H);

    // Warm golden center — golden hour feel
    const warm = ctx.createRadialGradient(W * 0.42, H * 0.5, 20, W * 0.42, H * 0.5, W * 0.65);
    warm.addColorStop(0,  'rgba(26, 18, 6, 0.0)');
    warm.addColorStop(0.45,'rgba(14, 10, 2, 0.55)');
    warm.addColorStop(1,  'rgba(4, 8, 20, 0.88)');
    ctx.fillStyle = warm;
    ctx.fillRect(0, 0, W, H);

    // Navy-tinted vignette at edges
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.22, W / 2, H / 2, W * 0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(5, 12, 26, 0.72)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawRays(cx, cy) {
    const pulse = 0.28 + Math.sin(time * 0.85) * 0.16;
    ctx.save();
    ctx.globalAlpha = 0.022 * pulse;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + time * 0.045;
      ctx.fillStyle = G.warm;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a - 0.055) * W * 0.7, cy + Math.sin(a - 0.055) * H * 1.2);
      ctx.lineTo(cx + Math.cos(a + 0.055) * W * 0.7, cy + Math.sin(a + 0.055) * H * 1.2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawScales(cx, cy, sz) {
    const swing = Math.sin(time * 0.65) * sz * 0.052;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 12;
    ctx.shadowColor = G.warm;

    ctx.strokeStyle = G.mid;
    ctx.lineWidth = sz * 0.040;
    ctx.beginPath();
    ctx.moveTo(cx, cy - sz * 0.52);
    ctx.lineTo(cx, cy + sz * 0.58);
    ctx.stroke();

    ctx.lineWidth = sz * 0.050;
    ctx.beginPath();
    ctx.moveTo(cx - sz * 0.22, cy + sz * 0.58);
    ctx.lineTo(cx + sz * 0.22, cy + sz * 0.58);
    ctx.stroke();

    ctx.fillStyle = G.ivory;
    ctx.shadowBlur = 16;
    ctx.shadowColor = G.pale;
    ctx.beginPath();
    ctx.arc(cx, cy - sz * 0.52, sz * 0.07, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = G.warm;
    ctx.shadowBlur = 12;
    ctx.shadowColor = G.warm;
    ctx.beginPath();
    ctx.arc(cx, cy - sz * 0.1, sz * 0.055, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = G.ivory;
    ctx.lineWidth = sz * 0.040;
    ctx.shadowBlur = 15;
    ctx.shadowColor = G.pale;
    ctx.beginPath();
    ctx.moveTo(cx - sz * 0.52, cy - sz * 0.1 + swing);
    ctx.lineTo(cx, cy - sz * 0.1);
    ctx.lineTo(cx + sz * 0.52, cy - sz * 0.1 - swing);
    ctx.stroke();

    function pan(px, py) {
      const ppy = py + sz * 0.32;
      ctx.strokeStyle = G.mid;
      ctx.lineWidth = sz * 0.020;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.moveTo(px, py); ctx.lineTo(px - sz * 0.15, ppy);
      ctx.moveTo(px, py); ctx.lineTo(px, ppy);
      ctx.moveTo(px, py); ctx.lineTo(px + sz * 0.15, ppy);
      ctx.stroke();
      ctx.strokeStyle = G.ivory;
      ctx.lineWidth = sz * 0.040;
      ctx.shadowBlur = 10;
      ctx.shadowColor = G.warm;
      ctx.beginPath();
      ctx.arc(px, ppy + sz * 0.05, sz * 0.19, Math.PI * 0.1, Math.PI * 0.9);
      ctx.stroke();
    }
    pan(cx - sz * 0.52, cy - sz * 0.1 + swing);
    pan(cx + sz * 0.52, cy - sz * 0.1 - swing);

    ctx.restore();
  }

  function drawEmblem() {
    const cx = 183, cy = H / 2, R = 130;
    ctx.save();

    drawRays(cx, cy);

    // Champagne-toned ambient glow
    const pulse = 0.42 + Math.sin(time * 1.1) * 0.22;
    const gl = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, R * 1.45);
    gl.addColorStop(0,   `rgba(200, 168, 100, ${0.16 * pulse})`);
    gl.addColorStop(0.55,`rgba(168, 136, 72, ${0.06 * pulse})`);
    gl.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = gl;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.45, 0, Math.PI * 2);
    ctx.fill();

    // Outer rotating ring — slower, more stately
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 0.11);
    for (let i = 0; i < 32; i++) {
      const a = (i / 32) * Math.PI * 2;
      const isMain = i % 8 === 0;
      const isMid  = i % 4 === 0;
      const innerR  = R * (isMain ? 0.80 : isMid ? 0.85 : 0.89);
      ctx.strokeStyle = isMain ? G.ivory : isMid ? G.warm : G.rich;
      ctx.lineWidth   = isMain ? 2.0 : isMid ? 1.1 : 0.7;
      ctx.globalAlpha = isMain ? 0.88 : 0.52;
      ctx.shadowBlur  = isMain ? 9 : 3;
      ctx.shadowColor = G.pale;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
      ctx.lineTo(Math.cos(a) * R * 0.97, Math.sin(a) * R * 0.97);
      ctx.stroke();
      if (isMain) {
        const mx = Math.cos(a) * R * 0.905, my = Math.sin(a) * R * 0.905;
        ctx.save();
        ctx.translate(mx, my);
        ctx.rotate(a + Math.PI / 4);
        ctx.globalAlpha = 0.82;
        ctx.fillStyle = G.ivory;
        ctx.shadowBlur = 12;
        ctx.shadowColor = G.pale;
        ctx.fillRect(-2.8, -2.8, 5.6, 5.6);
        ctx.restore();
      }
    }
    ctx.restore();

    // Counter-rotating inner dot ring
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-time * 0.075);
    for (let i = 0; i < 24; i++) {
      const a = (i / 24) * Math.PI * 2, isA = i % 6 === 0;
      ctx.globalAlpha = isA ? 0.55 : 0.25;
      ctx.fillStyle = isA ? G.rich : G.deep;
      ctx.shadowBlur = isA ? 5 : 0;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * R * 0.68, Math.sin(a) * R * 0.68, isA ? 2.0 : 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Ring borders — champagne
    ctx.globalAlpha = 0.82;
    ctx.strokeStyle = G.warm;
    ctx.lineWidth = 1.4;
    ctx.shadowBlur = 5;
    ctx.shadowColor = G.warm;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.78, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = 0.38;
    ctx.lineWidth = 0.7;
    ctx.strokeStyle = G.rich;
    ctx.shadowBlur = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.73, 0, Math.PI * 2);
    ctx.stroke();

    // Inner fill — warm dark, navy undertone
    ctx.globalAlpha = 1;
    const ibg = ctx.createRadialGradient(cx - R * 0.1, cy - R * 0.1, 0, cx, cy, R * 0.73);
    ibg.addColorStop(0,   '#16100A');
    ibg.addColorStop(0.55,'#0C0A07');
    ibg.addColorStop(1,   '#080808');
    ctx.fillStyle = ibg;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.72, 0, Math.PI * 2);
    ctx.fill();

    drawScales(cx, cy, R * 0.52);

    ctx.restore();
  }

  function drawVerticalDivider() {
    const x = 332, y1 = 72, y2 = H - 72;
    const g = ctx.createLinearGradient(x, y1, x, y2);
    g.addColorStop(0,   'rgba(176,144,64,0)');
    g.addColorStop(0.2, 'rgba(176,144,64,0.32)');
    g.addColorStop(0.5, 'rgba(192,160,80,0.48)');
    g.addColorStop(0.8, 'rgba(176,144,64,0.32)');
    g.addColorStop(1,   'rgba(176,144,64,0)');
    ctx.strokeStyle = g;
    ctx.lineWidth = 0.5;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
    ctx.stroke();
  }

  function drawText() {
    const tx = 362, cy = H / 2;
    ctx.save();
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    // --- NAPLES ---
    ctx.font = 'bold 78px Georgia, "Times New Roman", serif';
    const nW = ctx.measureText('NAPLES').width;

    const ng = ctx.createLinearGradient(tx, cy - 88, tx, cy - 18);
    ng.addColorStop(0,   '#EEE0C0');
    ng.addColorStop(0.3, G.warm);
    ng.addColorStop(0.65, G.mid);
    ng.addColorStop(1,   '#5C4010');
    ctx.fillStyle = ng;
    ctx.shadowBlur = 20;
    ctx.shadowColor = 'rgba(200, 160, 90, 0.38)';
    ctx.fillText('NAPLES', tx, cy - 52);

    // Slow, refined shimmer
    if (shimmer > tx - 110 && shimmer < tx + nW + 110) {
      const sg = ctx.createLinearGradient(shimmer - 110, 0, shimmer + 110, 0);
      sg.addColorStop(0,   'rgba(245,235,210,0)');
      sg.addColorStop(0.5, 'rgba(245,235,210,0.34)');
      sg.addColorStop(1,   'rgba(245,235,210,0)');
      ctx.fillStyle = sg;
      ctx.shadowBlur = 0;
      ctx.fillText('NAPLES', tx, cy - 52);
    }

    // Ornamental separator with diamonds
    const sy = cy - 8;
    const lg = ctx.createLinearGradient(tx, sy, tx + nW, sy);
    lg.addColorStop(0,   'rgba(176,144,64,0)');
    lg.addColorStop(0.1, G.rich);
    lg.addColorStop(0.5, G.warm);
    lg.addColorStop(0.9, G.rich);
    lg.addColorStop(1,   'rgba(176,144,64,0)');
    ctx.strokeStyle = lg;
    ctx.lineWidth = 0.7;
    ctx.shadowBlur = 3;
    ctx.shadowColor = G.warm;
    ctx.beginPath();
    ctx.moveTo(tx, sy);
    ctx.lineTo(tx + nW, sy);
    ctx.stroke();

    [0.14, 0.5, 0.86].forEach(pos => {
      ctx.save();
      ctx.translate(tx + nW * pos, sy);
      ctx.rotate(Math.PI / 4);
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = G.pale;
      ctx.shadowBlur = 8;
      ctx.shadowColor = G.ivory;
      ctx.fillRect(-2.4, -2.4, 4.8, 4.8);
      ctx.restore();
    });

    // --- JEWELRY BUYERS (wide tracking = Palm Beach luxury) ---
    ctx.font = '400 34px Georgia, "Times New Roman", serif';
    const gg = ctx.createLinearGradient(tx, 0, tx + 500, 0);
    gg.addColorStop(0,   G.rich);
    gg.addColorStop(0.3, G.warm);
    gg.addColorStop(0.52, G.pale);
    gg.addColorStop(0.72, G.warm);
    gg.addColorStop(1,   G.rich);
    ctx.fillStyle = gg;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(176,144,64,0.28)';
    let x2 = tx;
    for (const ch of 'JEWELRY BUYERS') {
      ctx.fillText(ch, x2, cy + 40);
      x2 += ctx.measureText(ch).width + 5.5;  // wider Palm Beach tracking
    }

    // --- NaplesJewelryBuyers.com — featured, not a footnote ---
    ctx.font = '400 20px Georgia, "Times New Roman", serif';
    const urlG = ctx.createLinearGradient(tx, 0, tx + 400, 0);
    urlG.addColorStop(0,   'rgba(176,144,64,0.55)');
    urlG.addColorStop(0.4, 'rgba(220,192,120,0.82)');
    urlG.addColorStop(0.65,'rgba(220,192,120,0.82)');
    urlG.addColorStop(1,   'rgba(176,144,64,0.55)');
    ctx.fillStyle = urlG;
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(176,144,64,0.25)';
    ctx.fillText('NaplesJewelryBuyers.com', tx, cy + 86);

    ctx.restore();
  }

  function render() {
    time    += 0.011;  // graceful, unhurried pace
    shimmer += 1.6;    // slow shimmer sweep
    if (shimmer > W + 320) shimmer = -280;

    drawBackground();
    updateParticles();
    drawParticles();
    drawEmblem();
    drawVerticalDivider();
    drawText();

    requestAnimationFrame(render);
  }

  render();
})();
</script>
</body>
</html>
